<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Deals</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="background-overlay"></div>

        <header class="header">
            <h1 class="main-title">WEEKDAY <span class="highlight">DEALS</span></h1>
            <p class="subtitle">Tuesday - Thursday</p>
        </header>

        <div class="deals-container">
            <div class="deal-card">
                <div class="day">TUESDAY</div>
                <div class="offer">
                    <span class="discount">10% OFF</span>
                    <span class="product">EDIBLES</span>
                </div>
            </div>

            <div class="deal-card">
                <div class="day">WEDNESDAY</div>
                <div class="offer">
                    <span class="discount">10% OFF</span>
                    <span class="product">CARTS</span>
                </div>
            </div>

            <div class="deal-card highlight-card">
                <div class="day">THURSDAY</div>
                <div class="offer">
                    <span class="discount">BOGO</span>
                    <span class="product">PRE-ROLLS</span>
                </div>
            </div>
        </div>
    </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
